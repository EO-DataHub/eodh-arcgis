name: Build, Test & Release

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore packages
        run: dotnet restore eodh.slnx

      - name: Build
        run: msbuild eodh.csproj -p:Configuration=Release

      - name: Build tests
        run: msbuild eodh.Tests/eodh.Tests.csproj -p:Configuration=Release -p:SkipArcGISTargets=true

      - name: Test
        run: dotnet test eodh.Tests/eodh.Tests.csproj -c Release -p:SkipArcGISTargets=true --no-build

      - uses: actions/upload-artifact@v7
        with:
          path: bin/Release/net8.0-windows/eodh.esriAddinX
          retention-days: 5

      - name: Create release
        if: github.ref_type == 'tag'
        run: gh release create ${{ github.ref_name }} bin/Release/net8.0-windows/eodh.esriAddinX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}