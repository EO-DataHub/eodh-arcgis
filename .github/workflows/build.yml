name: Build

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore packages
        run: dotnet restore eodh.csproj

      - name: Build
        run: msbuild eodh.csproj -p:Configuration=Release

      - name: Create release
        if: github.ref_type == 'tag'
        run: gh release create ${{ github.ref_name }} bin/Release/net8.0-windows/eodh.esriAddinX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}